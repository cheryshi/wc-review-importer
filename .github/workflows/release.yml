name: Release Plugin Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build the same production ZIP used by the main-branch build pipeline.
  package:
    name: Build production ZIP
    uses: ./.github/workflows/package.yml
    with:
      plugin-slug: wc-review-importer
      zip-name: wc-review-importer.zip
      artifact-name: wc-review-importer
      retention-days: 30

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: package

    steps:
      # Store the tag name once so release metadata stays consistent.
      - name: Read release tag
        id: release_tag
        run: |
          set -euo pipefail
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # Download the ZIP built by the reusable packaging workflow.
      - name: Download plugin package
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.artifact-name }}
          path: dist

      # Create a GitHub Release for the pushed tag and attach the production plugin ZIP.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: WooCommerce Review Importer ${{ steps.release_tag.outputs.tag }}
          files: dist/${{ needs.package.outputs.zip-name }}
          fail_on_unmatched_files: true
