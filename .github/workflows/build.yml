name: Build Plugin Package

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build production ZIP
    runs-on: ubuntu-latest

    steps:
      # Check out the repository so the workflow can package the current main branch contents.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Create a clean production package directory that keeps the plugin folder as the ZIP root.
      - name: Prepare package directory
        run: |
          set -euo pipefail
          rm -rf build wc-review-importer.zip
          mkdir -p build/wc-review-importer
          rsync -a ./ build/wc-review-importer/

      # Remove development-only files and directories from the package while keeping runtime plugin files.
      - name: Remove development files
        run: |
          set -euo pipefail
          cd build/wc-review-importer

          rm -rf docs
          rm -rf tests
          rm -rf .github
          rm -rf .git
          rm -f .gitignore
          rm -f phpunit.xml phpunit.xml.dist phpcs.xml phpcs.xml.dist
          rm -f composer.json composer.lock
          rm -rf node_modules
          rm -rf vendor/bin
          rm -f README.md

      # Build the installable WordPress plugin ZIP artifact.
      - name: Create plugin ZIP
        run: |
          set -euo pipefail
          cd build
          zip -r ../wc-review-importer.zip wc-review-importer

      # Upload the ZIP so it can be downloaded from the GitHub Actions run.
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc-review-importer
          path: wc-review-importer.zip
          if-no-files-found: error
