name: Build Plugin Package

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Reuse the shared packaging workflow so build and release jobs produce identical ZIP files.
  package:
    name: Build production ZIP
    uses: ./.github/workflows/package.yml
    with:
      plugin-slug: wc-review-importer
      zip-name: wc-review-importer.zip
      artifact-name: wc-review-importer
      retention-days: 14
